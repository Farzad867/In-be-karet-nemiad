name: Get My Driver 580
on:
  workflow_dispatch:

jobs:
  split_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Driver
        run: |
          # دانلود درایور با لینک مستقیم تو
          curl -L -o  nvidia-driver.run https://github.com/rust-lang/rust-analyzer/releases/download/2026-05-11/rust-analyzer-linux-x64.vsix

      - name: Split File (90MB parts)
        run: |
          mkdir -p driver_parts
          # تقسیم فایل به قطعات ۹۰ مگابایتی با پسوند عددی
          split -b 90M -d nvidia-driver.run ./driver_parts/nv_part.

      - name: Commit and Push to Project
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add driver_parts/* checksum.txt
          git commit -m "Add split driver 580.159.03 and checksum"
          git push -f
